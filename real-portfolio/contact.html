<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Abdifatah Hussein</title>

  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)" />
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin />
  <link
    href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap)"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css)"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container navbar">
      <a href="index.html" class="logo">Abdifatah</a>

      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="page-banner">
    <div class="container">
      <h1>Contact Me</h1>
      <p>Let's work together on your next website project.</p>
    </div>
  </section>

  <section class="contact-page section">
    <div class="container contact-grid">
      <div class="contact-info card">
        <h2>Get In Touch</h2>
        <p>
          I am available for portfolio websites, business websites, landing pages,
          and other modern web projects.
        </p>

        <div class="contact-item">
          <i class="fab fa-whatsapp"></i>
          <span>+254 722 778 695</span>
        </div>

        <div class="contact-item">
          <i class="fas fa-envelope"></i>
          <span>asidafarah27@gmail.com</span>
        </div>

        <div class="social-icons">
          <a href="[wa.me](https://wa.me/254722778695)" target="_blank" aria-label="WhatsApp">
            <i class="fab fa-whatsapp"></i>
          </a>
          <a href="[instagram.com](https://www.instagram.com)" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
          </a>
          <a href="[linkedin.com](https://www.linkedin.com)" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin-in"></i>
          </a>
          <a href="[github.com](https://www.github.com)" target="_blank" aria-label="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="[facebook.com](https://www.facebook.com)" target="_blank" aria-label="Facebook">
            <i class="fab fa-facebook-f"></i>
          </a>
        </div>
      </div>

      <form class="contact-form card" id="contactForm">
        <h2>Send a Message</h2>
        <input type="text" id="name" placeholder="Your Name" required />
        <input type="email" id="email" placeholder="Your Email" required />
        <input type="text" id="subject" placeholder="Subject" required />
        <textarea id="message" rows="6" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn btn-primary">Send Message</button>
        <p id="formMessage" class="form-message"></p>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
